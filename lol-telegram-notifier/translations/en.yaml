configuration:
  telegram_bot_token:
    name: Telegram bot token
    description: Token issued by BotFather.
  riot_api_key:
    name: Riot API key
    description: Personal Riot API key for EUW.
  players:
    name: Players
    description: Riot IDs in GameName#TAG format. Telegram IDs are not required.
  teammate_exclusion_players:
    name: Teammate exclusion players
    description: Riot IDs in GameName#TAG format. Suppress a notification only when one shares a tracked player's team.
  poll_interval_seconds:
    name: Poll interval (seconds)
  timezone:
    name: Timezone
  start_time:
    name: Monitoring start time
    description: Use HH:MM.
  end_time:
    name: Monitoring end time
    description: Use HH:MM or 24:00.
  notify_existing_on_start:
    name: Notify games already in progress on startup
  allow_all:
    name: Allow all queues
  allowed_queue_ids:
    name: Allowed queue IDs
    description: Used only when Allow all queues is disabled.
  max_group_size:
    name: Suppress notification when this many tracked players share a team
  repeat_notifications_for_testing:
    name: Repeat notifications for testing
    description: Leave disabled in normal operation because every poll will send another notification.
  profile_icons_enabled:
    name: Inline League profile icons
    description: Enable after entering the optional emoji set owner ID.
  emoji_set_owner_user_id:
    name: Emoji set owner Telegram ID
    description: Optional. Send /myid to the bot to retrieve your ID. Leave blank to keep normal text notifications.
  statistics_enabled:
    name: Weekly statistics
  weekly_recap_time:
    name: Weekly recap time
    description: Monday local time in HH:MM.
  minimum_pair_games:
    name: Minimum games for duo statistics
  match_retention_days:
    name: Match history retention (days)
